<!doctype html>
<html lang="{{ @html_lang ?: 'en' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ @title ?: 'Comasu Auth' }}</title>
    <style>
        body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;min-height:100vh;background:#f7f7f4;color:#1d1d1b}
        body.center{display:grid;place-items:center}
        main{width:min(720px,calc(100% - 32px));margin:32px auto;padding:32px;border:1px solid #d8d7d0;background:#fff;border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.06)}
        h1{font-size:28px;line-height:1.2;margin:0 0 12px}
        h2{font-size:18px;line-height:1.3;margin:28px 0 10px}
        p{font-size:16px;line-height:1.5;margin:0 0 16px;color:#45453f}
        a{color:#155bb5}
        dl{display:grid;grid-template-columns:max-content 1fr;gap:8px 16px;margin:24px 0 0;font-size:14px}
        dt{font-weight:700;color:#2c2c28}
        dd{margin:0;color:#55554e;overflow-wrap:anywhere}
        .actions{display:grid;gap:10px;margin-top:24px}
        .button{display:block;width:100%;box-sizing:border-box;border:1px solid #b9b8af;border-radius:6px;background:#fff;padding:12px 14px;text-align:center;font:inherit;color:#1d1d1b;text-decoration:none}
        .button[aria-disabled="true"]{opacity:.62;cursor:not-allowed}
        pre{white-space:pre-wrap;overflow:auto;background:#202124;color:#f5f5f5;border-radius:6px;padding:16px;font-size:13px;line-height:1.45}
        .notice{border-left:4px solid #155bb5;background:#eef5ff;padding:12px 14px;border-radius:4px;color:#1f3858}
        .error{border-left-color:#a32626;background:#fff1f1;color:#631d1d}
    </style>
</head>
<body class="center">
