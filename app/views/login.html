<include href="_layout_start.html" />
<section class="panel auth-panel">
    <h1>Sorkos Login</h1>
    <p>{{ @login_message }}</p>

    <div class="actions">
        <repeat group="{{ @providers }}" value="{{ @provider }}">
            <button class="button" type="button" aria-disabled="true" disabled>{{ @provider.label }}</button>
        </repeat>
    </div>

    <p class="notice" style="margin-top:24px">{{ @login.provider_pending }}</p>
</section>
<include href="_layout_end.html" />
