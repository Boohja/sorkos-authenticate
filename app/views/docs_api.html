<include href="_layout_start.html" />
<section class="panel wide swagger-panel">
    <div class="swagger-heading">
        <div>
            <h1>API Endpoints</h1>
            <p>Rendered from the OpenAPI document at <a href="/docs/openapi.json"><code>/docs/openapi.json</code></a>.</p>
        </div>
        <a class="button swagger-json-link" href="/docs/openapi.json">Open JSON</a>
    </div>

    <noscript>
        <p class="notice error">Swagger UI needs JavaScript to render the OpenAPI document.</p>
    </noscript>

    <div id="swagger-ui" class="swagger-ui-root"></div>
</section>

<link rel="stylesheet" href="/public/vendor/swagger-ui/swagger-ui.css">
<script src="/public/vendor/swagger-ui/swagger-ui-bundle.js"></script>
<script>
    window.addEventListener('load', function () {
        if (!window.SwaggerUIBundle) {
            document.getElementById('swagger-ui').innerHTML = '<p class="notice error">Swagger UI could not be loaded. Check that the local Swagger UI assets exist in /public/vendor/swagger-ui/.</p>';
            return;
        }

        window.SwaggerUIBundle({
            url: '/docs/openapi.json',
            dom_id: '#swagger-ui',
            deepLinking: true,
            displayRequestDuration: true,
            supportedSubmitMethods: [],
            presets: [
                window.SwaggerUIBundle.presets.apis
            ],
            layout: 'BaseLayout'
        });
    });
</script>
<include href="_layout_end.html" />
