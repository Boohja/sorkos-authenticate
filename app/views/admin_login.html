<include href="_layout_start.html" />
<section class="panel">
    <h1>Admin Login</h1>
    <check if="{{ @invalid_login }}">
        <p class="notice error">Invalid data.</p>
    </check>
    <form class="form-stack" method="post" action="/admin/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <label for="otp">One-time password</label>
        <input id="otp" name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>

        <button class="button primary" type="submit">Sign In</button>
    </form>
</section>
<include href="_layout_end.html" />
